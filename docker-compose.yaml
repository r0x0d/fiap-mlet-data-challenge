version: '3.8'

services:
  mlflow:
    image: python:3.9-slim
    ports:
      - "5000:5000"
    command: >
      sh -c "pip install mlflow prometheus-client && 
             mlflow server --host 0.0.0.0 --port 5000 
             --backend-store-uri sqlite:///mlflow.db 
             --default-artifact-root file:///mlflow"
    volumes:
      - ./mlflow:/mlflow

  api:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
      - "9100:9100"  # Prometheus metrics endpoint
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_URI=models:/news_classifier/production
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 & 
             streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  grafana-storage: